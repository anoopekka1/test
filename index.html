<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Valentine Proposal 💖</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="hearts"></div>

  <div class="card">
    <div class="emoji bounce">🐱❤️</div>

    <h2 id="question">My love will you be my valentine?</h2>

    <input type="text" id="nameInput" placeholder="Enter your name 💌" />

    <div class="buttons">
      <button id="yesBtn">Yes</button>
      <button id="noBtn">No</button>
    </div>

    <p id="message">"No" seems a bit shy 😈</p>

    <button id="shareBtn" style="display:none;">📲 Share on WhatsApp</button>
    <button id="musicBtn">🎵 Play Music</button>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
  </audio>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
