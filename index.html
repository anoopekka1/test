<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>For Tripti 💖</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="card" id="lockScreen">
    <div class="envelope">✉️</div>
    <h2>A message for you 💌</h2>
    <p>Complete the verse to unlock</p>

    <div class="passwordBox">
      <span>Romans :</span>
      <input type="text" id="part1" maxlength="1" />
      <span>:</span>
      <input type="text" id="part2" maxlength="2" />
    </div>

    <button onclick="unlock()">Unlock 🔓</button>
    <p id="error"></p>
  </div>

  <audio id="bgMusic" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
  </audio>

  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
